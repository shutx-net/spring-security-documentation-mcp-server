version: 0.2

# REF and COMMIT_SHA are injected by Step Functions (CodeBuildStartBuild env override).
# CONTENT_BUCKET is set as a static CodeBuild environment variable by CDK.
env:
  variables:
    SPRING_SECURITY_REPO: "https://github.com/spring-projects/spring-security.git"
    REF: ""
    COMMIT_SHA: ""

phases:
  install:
    runtime-versions:
      java: corretto21
      nodejs: 20

  build:
    on-failure: ABORT
    commands:
      - |
        set -eu
        CLONE_DIR="/tmp/spring-security-${REF}"
        echo "=== Cloning spring-security branch ${REF} ==="
        git clone --depth 1 --branch "$REF" "$SPRING_SECURITY_REPO" "$CLONE_DIR"
        echo "=== Running Antora build ==="
        (cd "$CLONE_DIR" && ./gradlew --no-daemon -PbuildSrc.skipTests=true :spring-security-docs:antora)
        ARTIFACT_KEY="artifacts/${REF}/${COMMIT_SHA}/site.tar.gz"
        echo "=== Packaging site ==="
        tar -czf /tmp/site.tar.gz -C "${CLONE_DIR}/docs/build/site" .
        echo "=== Uploading to s3://${CONTENT_BUCKET}/${ARTIFACT_KEY} ==="
        aws s3 cp /tmp/site.tar.gz "s3://${CONTENT_BUCKET}/${ARTIFACT_KEY}"
        echo "=== Done: ${REF} @ ${COMMIT_SHA} ==="

  post_build:
    commands:
      - echo "Antora build completed at $(date -u '+%Y-%m-%dT%H:%M:%SZ')"

cache:
  paths:
    - /root/.gradle/caches/**/*
    - /root/.gradle/wrapper/dists/**/*
