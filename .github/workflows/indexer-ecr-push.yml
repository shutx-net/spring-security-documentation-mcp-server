name: Build and Push Indexer to ECR

on:
  push:
    branches: [main]
    paths:
      - 'cdk/pipeline/**'
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC token issuance
  contents: read

env:
  AWS_REGION: ap-northeast-1

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: cdk/pipeline/tests/requirements-test.txt

      - name: Install test dependencies
        run: pip install -r cdk/pipeline/tests/requirements-test.txt

      - name: Run tests
        run: pytest -v
        working-directory: cdk/pipeline

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build, tag, and push indexer image to Amazon ECR
        uses: docker/build-push-action@v6
        with:
          context: cdk/pipeline/
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ vars.INDEXER_ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ vars.INDEXER_ECR_REPOSITORY }}:latest
